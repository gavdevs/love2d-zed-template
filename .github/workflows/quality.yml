name: Quality 🧹

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  stylua:
    name: Format check (StyLua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check game/ spec/

  luacheck:
    name: Lint (luacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lunarmodules/luacheck@v1

  busted:
    name: Test (busted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install busted
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lua-busted
      - name: Run specs
        run: busted
